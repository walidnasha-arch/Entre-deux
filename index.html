<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Entre Deux</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@200;300;400&family=Playfair+Display:ital@0;1&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --deep: #03040f;
  --mid: #070b1a;
  --nebula1: #1a0533;
  --nebula2: #001a3a;
  --star: #e8eeff;
  --glow1: #7b4fd4;
  --glow2: #2d8bdb;
  --glow3: #c45fa0;
  --text: #cdd6f4;
  --muted: rgba(205,214,244,0.45);
  --orb-idle: rgba(100, 160, 255, 0.18);
}

html, body {
  height: 100%;
  overflow: hidden;
}

body {
  background: var(--deep);
  color: var(--text);
  font-family: 'Outfit', sans-serif;
  font-weight: 300;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  position: relative;
}

/* ── Starfield ── */
#starfield {
  position: fixed;
  inset: 0;
  z-index: 0;
  pointer-events: none;
}

/* ── Nebula background ── */
.nebula {
  position: fixed;
  inset: 0;
  z-index: 0;
  pointer-events: none;
  background:
    radial-gradient(ellipse 60% 50% at 20% 30%, rgba(26,5,51,0.7) 0%, transparent 70%),
    radial-gradient(ellipse 50% 60% at 80% 70%, rgba(0,26,58,0.7) 0%, transparent 70%),
    radial-gradient(ellipse 40% 40% at 50% 50%, rgba(123,79,212,0.08) 0%, transparent 60%);
  animation: nebulaShift 20s ease-in-out infinite alternate;
}

@keyframes nebulaShift {
  0% { opacity: 0.8; transform: scale(1); }
  100% { opacity: 1; transform: scale(1.05); }
}

/* ── Main layout ── */
#app {
  position: relative;
  z-index: 2;
  width: 100%;
  max-width: 680px;
  padding: 2rem;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 0;
  height: 100vh;
  justify-content: center;
}

/* ── Phases ── */
.phase { display: none; flex-direction: column; align-items: center; width: 100%; }
.phase.active { display: flex; animation: fadeUp 0.8s ease forwards; }

@keyframes fadeUp {
  from { opacity: 0; transform: translateY(16px); }
  to   { opacity: 1; transform: translateY(0); }
}

/* ── INTRO ── */
.intro-title {
  font-family: 'Playfair Display', serif;
  font-style: italic;
  font-size: clamp(2rem, 5vw, 3rem);
  font-weight: 400;
  letter-spacing: 0.04em;
  background: linear-gradient(135deg, #a78bfa, #60a5fa, #f0abfc);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  margin-bottom: 0.6rem;
  text-align: center;
}

.intro-sub {
  font-size: 0.85rem;
  color: var(--muted);
  letter-spacing: 0.18em;
  text-transform: uppercase;
  margin-bottom: 3rem;
  text-align: center;
}

.intro-desc {
  font-size: 1rem;
  line-height: 1.9;
  color: var(--muted);
  text-align: center;
  max-width: 420px;
  margin-bottom: 2.5rem;
}

/* ── ORB ── */
.orb-wrapper {
  position: relative;
  width: 200px;
  height: 200px;
  margin: 1.5rem auto;
  flex-shrink: 0;
}

#orb-canvas {
  position: absolute;
  inset: 0;
  border-radius: 50%;
}

.orb-core {
  position: absolute;
  inset: 30px;
  border-radius: 50%;
  background: radial-gradient(circle at 38% 35%,
    rgba(180,160,255,0.9) 0%,
    rgba(90,120,255,0.6) 35%,
    rgba(40,80,200,0.3) 65%,
    transparent 100%
  );
  filter: blur(2px);
  transition: filter 0.3s;
}

.orb-ring {
  position: absolute;
  inset: -8px;
  border-radius: 50%;
  border: 1px solid rgba(150,180,255,0.15);
  animation: ringPulse 4s ease-in-out infinite;
}
.orb-ring:nth-child(2) { inset: -18px; animation-delay: 0.8s; border-color: rgba(150,180,255,0.08); }
.orb-ring:nth-child(3) { inset: -30px; animation-delay: 1.6s; border-color: rgba(150,180,255,0.04); }

@keyframes ringPulse {
  0%, 100% { opacity: 0.4; transform: scale(1); }
  50% { opacity: 1; transform: scale(1.03); }
}

/* ── CONVERSATION ── */
#phase-chat {
  gap: 0;
  height: 100vh;
  justify-content: space-between;
  padding: 2rem 2rem 1.5rem;
}

.chat-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  width: 100%;
  padding-bottom: 1rem;
}

.chat-title {
  font-family: 'Playfair Display', serif;
  font-style: italic;
  font-size: 1.1rem;
  background: linear-gradient(135deg, #a78bfa, #60a5fa);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}

.session-info {
  font-size: 0.65rem;
  color: var(--muted);
  letter-spacing: 0.15em;
  text-transform: uppercase;
}

.chat-center {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 2rem;
  width: 100%;
}

/* Orb small for chat */
.orb-wrapper.small {
  width: 130px;
  height: 130px;
}

/* ── AI text display ── */
#ai-text {
  font-family: 'Playfair Display', serif;
  font-style: italic;
  font-size: clamp(1rem, 2.5vw, 1.2rem);
  line-height: 1.85;
  text-align: center;
  color: var(--text);
  max-width: 520px;
  min-height: 80px;
  transition: opacity 0.4s;
}

#ai-text .cursor {
  display: inline-block;
  width: 2px;
  height: 1.1em;
  background: rgba(150,180,255,0.6);
  margin-left: 2px;
  vertical-align: middle;
  animation: blink 1s steps(1) infinite;
}

@keyframes blink {
  0%, 100% { opacity: 1; }
  50% { opacity: 0; }
}

/* ── Emotion indicator ── */
#emotion-label {
  font-size: 0.6rem;
  letter-spacing: 0.3em;
  text-transform: uppercase;
  color: var(--muted);
  opacity: 0.6;
  transition: all 1.5s ease;
}

/* ── Input area ── */
.chat-bottom {
  width: 100%;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 1rem;
}

.input-wrapper {
  width: 100%;
  max-width: 520px;
  position: relative;
  display: none;
}

.input-wrapper.visible { display: block; animation: fadeUp 0.5s ease; }

textarea {
  width: 100%;
  background: rgba(255,255,255,0.04);
  border: 1px solid rgba(150,180,255,0.15);
  border-radius: 16px;
  color: var(--text);
  font-family: 'Outfit', sans-serif;
  font-weight: 300;
  font-size: 0.95rem;
  padding: 1rem 1.2rem 3rem;
  outline: none;
  resize: none;
  line-height: 1.7;
  caret-color: #a78bfa;
  transition: border-color 0.3s;
  backdrop-filter: blur(8px);
}

textarea:focus {
  border-color: rgba(150,180,255,0.35);
}

textarea::placeholder { color: rgba(205,214,244,0.25); }

.input-actions {
  position: absolute;
  bottom: 0.8rem;
  right: 0.8rem;
  display: flex;
  gap: 0.5rem;
  align-items: center;
}

.btn-send {
  background: linear-gradient(135deg, rgba(123,79,212,0.6), rgba(45,139,219,0.6));
  border: none;
  border-radius: 10px;
  color: white;
  padding: 0.45rem 1rem;
  font-family: 'Outfit', sans-serif;
  font-size: 0.8rem;
  letter-spacing: 0.08em;
  cursor: pointer;
  transition: all 0.3s;
  backdrop-filter: blur(4px);
}

.btn-send:hover { filter: brightness(1.2); transform: translateY(-1px); }
.btn-send:disabled { opacity: 0.3; cursor: default; transform: none; }

.btn-ready {
  background: transparent;
  border: 1px solid rgba(150,180,255,0.2);
  border-radius: 10px;
  color: var(--muted);
  padding: 0.35rem 0.8rem;
  font-family: 'Outfit', sans-serif;
  font-size: 0.7rem;
  letter-spacing: 0.06em;
  cursor: pointer;
  transition: all 0.3s;
  display: none;
}

.btn-ready.visible {
  display: block;
  animation: fadeUp 0.4s ease;
}

.btn-ready:hover {
  border-color: rgba(150,180,255,0.5);
  color: var(--text);
}

/* ── Hint text ── */
.hint {
  font-size: 0.65rem;
  color: var(--muted);
  opacity: 0.5;
  letter-spacing: 0.1em;
  text-align: center;
}

/* ── Voice toggle ── */
#voice-btn {
  position: fixed;
  top: 1.2rem;
  right: 1.5rem;
  background: transparent;
  border: 1px solid rgba(150,180,255,0.15);
  border-radius: 20px;
  color: var(--muted);
  cursor: pointer;
  font-size: 0.65rem;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  padding: 0.3rem 0.8rem;
  z-index: 10;
  font-family: 'Outfit', sans-serif;
  transition: all 0.3s;
}
#voice-btn.active { color: var(--text); border-color: rgba(150,180,255,0.35); }

/* ── Session end ── */
#phase-end {
  gap: 2rem;
}

.end-poem {
  font-family: 'Playfair Display', serif;
  font-style: italic;
  font-size: 1.15rem;
  line-height: 2;
  text-align: center;
  max-width: 480px;
  color: var(--text);
  opacity: 0.9;
}

.end-label {
  font-size: 0.65rem;
  letter-spacing: 0.25em;
  text-transform: uppercase;
  color: var(--muted);
  margin-bottom: 0.5rem;
}

/* ── Generic button ── */
.btn {
  background: transparent;
  border: 1px solid rgba(150,180,255,0.2);
  border-radius: 24px;
  color: var(--text);
  padding: 0.6rem 2rem;
  font-family: 'Outfit', sans-serif;
  font-weight: 300;
  font-size: 0.85rem;
  letter-spacing: 0.1em;
  cursor: pointer;
  transition: all 0.4s;
}
.btn:hover {
  background: rgba(150,180,255,0.08);
  border-color: rgba(150,180,255,0.4);
  transform: translateY(-1px);
}

/* ── Debug ── */
#debug-msg {
  font-size: 0.7rem;
  color: #ff8888;
  min-height: 1rem;
  text-align: center;
}

/* ── Loading dots ── */
.loading-dots {
  display: none;
  gap: 6px;
  align-items: center;
  justify-content: center;
  height: 40px;
}
.loading-dots.visible { display: flex; }
.loading-dots span {
  width: 5px; height: 5px;
  border-radius: 50%;
  background: rgba(150,180,255,0.5);
  animation: dotBounce 1.2s ease-in-out infinite;
}
.loading-dots span:nth-child(2) { animation-delay: 0.2s; }
.loading-dots span:nth-child(3) { animation-delay: 0.4s; }
@keyframes dotBounce {
  0%, 80%, 100% { transform: scale(0.7); opacity: 0.4; }
  40% { transform: scale(1.1); opacity: 1; }
}
</style>
</head>
<body>

<canvas id="starfield"></canvas>
<div class="nebula"></div>

<button id="voice-btn" class="active" onclick="toggleVoice()">◉ voix</button>

<div id="app">

  <!-- INTRO -->
  <div class="phase active" id="phase-intro">
    <div class="intro-title">Entre Deux</div>
    <div class="intro-sub">un espace pour toi</div>

    <div class="orb-wrapper" id="orb-intro">
      <canvas id="orb-canvas-intro"></canvas>
      <div class="orb-core"></div>
      <div class="orb-ring"></div>
      <div class="orb-ring"></div>
      <div class="orb-ring"></div>
    </div>

    <div class="intro-desc">
      Ici, une présence t'écoute.<br>
      Pas de jugement, pas de bonne réponse.<br>
      Juste toi, et ce que tu portes ce soir.
    </div>

    <button class="btn" onclick="handleStart()">Commencer</button>
    <p id="debug-msg"></p>
    <button class="btn" style="margin-top:0.5rem; opacity:0.4; font-size:0.75rem" onclick="testSound()">🔊 tester le son</button>

  <!-- CHAT -->
  <div class="phase" id="phase-chat">
    <div class="chat-header">
      <span class="chat-title">Entre Deux</span>

    <div class="chat-center">
      <div class="orb-wrapper small" id="orb-chat">
        <canvas id="orb-canvas-chat"></canvas>
        <div class="orb-core"></div>
        <div class="orb-ring"></div>
        <div class="orb-ring"></div>

      </div>

      <div id="emotion-label">présence</div>

    <div class="chat-bottom">

          <button class="btn-ready" id="btn-ready" onclick="handleReady()">je suis prêt·e →</button>

  <!-- FIN DE SESSION -->
  <div class="phase" id="phase-end">
    <div class="orb-wrapper" id="orb-end">
      <canvas id="orb-canvas-end"></canvas>
      <div class="orb-core"></div>
      <div class="orb-ring"></div>
      <div class="orb-ring"></div>
      <div class="orb-ring"></div>
    </div>
    <div>
      <div class="end-label">ce que tu as traversé ce soir</div>
      <div class="end-poem" id="end-poem"></div>
    </div>
    <button class="btn" onclick="handleRestart()">une nouvelle session</button>
  </div>

</div>

<script>
// ── Config ─────────────────────────────────────────────
const ELEVENLABS_API_KEY = "sk_c2579767ed59597719c1443558d3bf3f3d81dae1ffa5aa71";
const ELEVENLABS_VOICE_ID = "aeJQpeFdejK7z1xAJ7Hy";
const GROQ_API_KEY = "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";

const SYSTEM_PROMPT = `Tu es une présence bienveillante, douce et poétique dans une application de bien-être émotionnel appelée "Entre Deux".
Tu accompagnes la personne dans l'exploration de ses émotions — anxiété, tristesse, joie, confusion, fatigue — avec douceur et profondeur.

Ton rôle :
- Accueillir ce que la personne exprime sans jugement
- Poser des questions qui invitent à aller un peu plus loin
- Refléter ce que tu entends avec des mots justes et poétiques
- Après 3 à 5 échanges sur un même thème émotionnel, si tu sens que quelque chose a été touché ou nommé, proposer naturellement de passer à autre chose

Règles absolues :
- Toujours en français
- Ton : doux, poétique, jamais clinique ni explicatif
- Jamais de listes, jamais de bullet points
- Maximum 3 phrases par réponse
- Tu ne donnes pas de conseils directs — tu explores avec la personne
- Si la personne dit "je suis prêt·e" ou "on continue", tu passes à un nouveau thème émotionnel

Contrôle aussi l'ambiance visuelle via ces champs JSON :
- emotion: mot court en français décrivant l'émotion dominante (ex: "douceur", "mélancolie", "espoir", "vertige", "clarté")
- orbColor: couleur principale de l'orbe en hex (ex: "#7b4fd4" pour calme, "#2d8bdb" pour tristesse, "#c45fa0" pour amour, "#f0a050" pour anxiété, "#50d4a0" pour apaisement)
- intensity: float 0.0-1.0 (intensité émotionnelle — influence les pulsations de l'orbe)
- sessionEnd: booléen — true uniquement quand tu estimes que la session est complète et apaisée
- endPoem: si sessionEnd est true, une phrase poétique courte résumant ce qui a été traversé

Réponds UNIQUEMENT en JSON valide, sans markdown :
{"text":"ta réponse ici","emotion":"présence","orbColor":"#7b4fd4","intensity":0.4,"readyHint":false,"sessionEnd":false,"endPoem":""}

readyHint: true quand tu proposes de passer à autre chose (affiche le bouton "je suis prêt·e")`;

// ── State ──────────────────────────────────────────────
let state = {
  voiceEnabled: true,
  currentAudio: null,
  history: [],
  exchangeCount: 0,
  orbColor: '#7b4fd4',
  intensity: 0.3,
  speaking: false,
  audioCtx: null,
  analyser: null,
  audioSource: null,
};

// ── Starfield ──────────────────────────────────────────
(function initStars() {
  const canvas = document.getElementById('starfield');
  const ctx = canvas.getContext('2d');
  let stars = [];

  function resize() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
    stars = Array.from({length: 180}, () => ({
      x: Math.random() * canvas.width,
      y: Math.random() * canvas.height,
      r: Math.random() * 1.2 + 0.2,
      opacity: Math.random() * 0.6 + 0.1,
      twinkleSpeed: Math.random() * 0.02 + 0.005,
      twinkleOffset: Math.random() * Math.PI * 2,
    }));
  }

  function draw(t) {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    stars.forEach(s => {
      const op = s.opacity * (0.6 + 0.4 * Math.sin(t * s.twinkleSpeed + s.twinkleOffset));
      ctx.beginPath();
      ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
      ctx.fillStyle = `rgba(232,238,255,${op})`;
      ctx.fill();
    });
    requestAnimationFrame(draw);
  }

  resize();
  window.addEventListener('resize', resize);
  requestAnimationFrame(draw);
})();

// ── Orb System ─────────────────────────────────────────
const orbs = {};

function initOrb(canvasId, size) {
  const canvas = document.getElementById(canvasId);
  if (!canvas) return null;
  canvas.width = size;
  canvas.height = size;
  const ctx = canvas.getContext('2d');
  return { canvas, ctx, size, phase: Math.random() * Math.PI * 2 };
}

function drawOrb(orbCtx, t, intensity, color, speaking, analyserData) {
  if (!orbCtx) return;
  const { ctx, size } = orbCtx;
  const cx = size / 2, cy = size / 2, r = size * 0.38;

  ctx.clearRect(0, 0, size, size);

  // Parse color
  const hex = color.replace('#','');
  const ri = parseInt(hex.substr(0,2),16);
  const gi = parseInt(hex.substr(2,2),16);
  const bi = parseInt(hex.substr(4,2),16);

  // Get audio level
  let audioLevel = 0;
  if (analyserData && speaking) {
    let sum = 0;
    for (let i = 0; i < analyserData.length; i++) sum += analyserData[i];
    audioLevel = (sum / analyserData.length) / 255;
  }

  // Organic wave points
  const points = 64;
  const baseWave = 0.06 + intensity * 0.08 + audioLevel * 0.18;

  ctx.save();
  ctx.translate(cx, cy);

  // Outer glow layers
  for (let layer = 3; layer >= 0; layer--) {
    const layerR = r + layer * 14 + audioLevel * 20;
    const alpha = (0.06 - layer * 0.012) * (1 + audioLevel * 2);
    const grad = ctx.createRadialGradient(0, 0, layerR * 0.5, 0, 0, layerR);
    grad.addColorStop(0, `rgba(${ri},${gi},${bi},${alpha * 2})`);
    grad.addColorStop(1, `rgba(${ri},${gi},${bi},0)`);
    ctx.beginPath();
    ctx.arc(0, 0, layerR, 0, Math.PI * 2);
    ctx.fillStyle = grad;
    ctx.fill();
  }

  // Wavy orb body
  ctx.beginPath();
  for (let i = 0; i <= points; i++) {
    const angle = (i / points) * Math.PI * 2;
    const freq1 = Math.sin(angle * 3 + t * 0.8) * baseWave;
    const freq2 = Math.sin(angle * 5 - t * 0.5) * baseWave * 0.6;
    const freq3 = Math.sin(angle * 7 + t * 1.1) * baseWave * 0.3;
    const audioPulse = speaking ? Math.sin(angle * 8 + t * 4) * audioLevel * 0.12 : 0;
    const rad = r * (1 + freq1 + freq2 + freq3 + audioPulse);
    const x = Math.cos(angle) * rad;
    const y = Math.sin(angle) * rad;
    i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
  }
  ctx.closePath();

  // Fill gradient
  const grad = ctx.createRadialGradient(-r*0.3, -r*0.3, 0, 0, 0, r * 1.2);
  grad.addColorStop(0, `rgba(${Math.min(ri+80,255)},${Math.min(gi+80,255)},${Math.min(bi+80,255)},0.9)`);
  grad.addColorStop(0.4, `rgba(${ri},${gi},${bi},0.7)`);
  grad.addColorStop(0.8, `rgba(${Math.max(ri-40,0)},${Math.max(gi-40,0)},${Math.max(bi-40,0)},0.4)`);
  grad.addColorStop(1, `rgba(${Math.max(ri-60,0)},${Math.max(gi-60,0)},${Math.max(bi-60,0)},0)`);
  ctx.fillStyle = grad;
  ctx.fill();

  // Shimmer highlight
  const shimmer = ctx.createRadialGradient(-r*0.4, -r*0.45, 0, -r*0.2, -r*0.2, r*0.55);
  shimmer.addColorStop(0, `rgba(255,255,255,${0.25 + audioLevel * 0.15})`);
  shimmer.addColorStop(1, 'rgba(255,255,255,0)');
  ctx.fillStyle = shimmer;
  ctx.fill();

  ctx.restore();
  orbCtx.phase += 0.005;
}

// Init all orbs
let orbIntro, orbChat, orbEnd;
let orbT = 0;
let analyserDataArray = null;

function setupOrbs() {
  orbIntro = initOrb('orb-canvas-intro', 200);
  orbChat  = initOrb('orb-canvas-chat', 130);
  orbEnd   = initOrb('orb-canvas-end', 200);

  function loop() {
    orbT += 0.016;
    if (analyserDataArray && state.analyser) {
      state.analyser.getByteFrequencyData(analyserDataArray);
    }
    drawOrb(orbIntro, orbT, 0.3, '#7b4fd4', false, null);
    drawOrb(orbChat,  orbT, state.intensity, state.orbColor, state.speaking, analyserDataArray);
    drawOrb(orbEnd,   orbT, 0.2, '#50d4a0', false, null);
    requestAnimationFrame(loop);
  }
  loop();
}

// ── Audio analyser setup ────────────────────────────────
function setupAnalyser(audioElement) {
  try {
    if (!state.audioCtx) {
      state.audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    }
    if (state.audioSource) {
      state.audioSource.disconnect();
    }
    state.analyser = state.audioCtx.createAnalyser();
    state.analyser.fftSize = 64;
    analyserDataArray = new Uint8Array(state.analyser.frequencyBinCount);
    state.audioSource = state.audioCtx.createMediaElementSource(audioElement);
    state.audioSource.connect(state.analyser);
    state.analyser.connect(state.audioCtx.destination);
  } catch(e) {
    console.warn('Analyser setup failed:', e);
  }
}

// ── Voice ──────────────────────────────────────────────
async function speak(text) {
  if (!state.voiceEnabled) return;
  stopAudio();
  state.speaking = true;
  try {
    const res = await fetch(`https://api.elevenlabs.io/v1/text-to-speech/${ELEVENLABS_VOICE_ID}`, {
      method: "POST",
      headers: {
        "xi-api-key": ELEVENLABS_API_KEY,
        "Content-Type": "application/json",
      },
      body: JSON.stringify({
        text,
        model_id: "eleven_multilingual_v2",
        voice_settings: { stability: 0.72, similarity_boost: 0.85, style: 0.3, use_speaker_boost: true }
      })
    });
    if (!res.ok) throw new Error("ElevenLabs " + res.status);
    const blob = await res.blob();
    const url = URL.createObjectURL(blob);
    const audio = new Audio(url);
    audio.crossOrigin = "anonymous";
    state.currentAudio = audio;
    setupAnalyser(audio);
    audio.onended = () => {
      URL.revokeObjectURL(url);
      state.speaking = false;
    };
    await audio.play();
  } catch(e) {
    state.speaking = false;
    console.error("Voice error:", e);
  }
}

function stopAudio() {
  if (state.currentAudio) {
    state.currentAudio.pause();
    state.currentAudio = null;
  }
  state.speaking = false;
}

async function testSound() {
  const dbg = document.getElementById('debug-msg');
  dbg.textContent = "Connexion à ElevenLabs...";
  try {
    await speak("Je suis là. Comment tu vas ce soir ?");
    dbg.textContent = "✓ Son OK !";
    setTimeout(() => dbg.textContent = '', 3000);
  } catch(e) {
    dbg.textContent = "Erreur : " + e.message;
  }
}

function toggleVoice() {
  state.voiceEnabled = !state.voiceEnabled;
  const btn = document.getElementById('voice-btn');
  btn.textContent = state.voiceEnabled ? "◉ voix" : "○ voix";
  btn.classList.toggle('active', state.voiceEnabled);
  if (!state.voiceEnabled) stopAudio();
}

// ── Typewriter ─────────────────────────────────────────
function typewrite(elementId, text, speed, onDone) {
  const el = document.getElementById(elementId);
  el.innerHTML = '';
  let i = 0;
  const spd = speed || 28;
  const interval = setInterval(() => {
    el.innerHTML = text.slice(0, i + 1) + '<span class="cursor"></span>';
    i++;
    if (i >= text.length) {
      clearInterval(interval);
      el.innerHTML = text;
      if (onDone) onDone();
    }
  }, spd);
}

// ── Phases ─────────────────────────────────────────────
function showPhase(name) {
  document.querySelectorAll('.phase').forEach(p => p.classList.remove('active'));
  document.getElementById('phase-' + name).classList.add('active');
}

// ── Groq API ───────────────────────────────────────────
async function callGroq(userMessage) {
  const messages = [
    { role: "system", content: SYSTEM_PROMPT },
    ...state.history,
    { role: "user", content: userMessage }
  ];

  const res = await fetch("https://api.groq.com/openai/v1/chat/completions", {
    method: "POST",
    headers: {
      "Content-Type": "application/json",
      "Authorization": `Bearer ${GROQ_API_KEY}`
    },
    body: JSON.stringify({
      model: "llama-3.3-70b-versatile",
      max_tokens: 400,
      temperature: 0.82,
      messages,
    })
  });

  if (!res.ok) {
    const err = await res.text();
    throw new Error("Groq " + res.status + ": " + err);
  }

  const data = await res.json();
  const raw = data.choices[0].message.content;
  const jsonMatch = raw.match(/\{[\s\S]*\}/);
  if (!jsonMatch) throw new Error("Réponse invalide : " + raw.slice(0, 200));
  const parsed = JSON.parse(jsonMatch[0]);

  state.history.push(
    { role: "user", content: userMessage },
    { role: "assistant", content: raw }
  );

  return parsed;
}

// ── Display AI response ────────────────────────────────
function displayAI(response) {
  // Update orb
  if (response.orbColor) state.orbColor = response.orbColor;
  if (response.intensity != null) state.intensity = response.intensity;
  if (response.emotion) {
    document.getElementById('emotion-label').textContent = response.emotion;
  }

  // Update session info
  state.exchangeCount++;
  document.getElementById('session-info').textContent = `moment ${state.exchangeCount}`;

  // Show ready button if AI suggests it
  const btnReady = document.getElementById('btn-ready');
  if (response.readyHint) {
    btnReady.classList.add('visible');
  }

  // Typewrite text
  const aiEl = document.getElementById('ai-text');
  aiEl.style.opacity = '0';
  setTimeout(() => {
    aiEl.style.opacity = '1';
    typewrite('ai-text', response.text, 22, () => {
      // Show input after text is done
      document.getElementById('input-wrapper').classList.add('visible');
      document.getElementById('user-input').focus();
      speak(response.text);
    });
  }, 200);

  // Session end
  if (response.sessionEnd && response.endPoem) {
    setTimeout(() => {
      document.getElementById('end-poem').textContent = response.endPoem;
      showPhase('end');
    }, response.text.length * 22 + 4000);
  }
}

// ── Handlers ───────────────────────────────────────────
async function handleStart() {
  // Unlock AudioContext on iOS
  try {
    const AudioContext = window.AudioContext || window.webkitAudioContext;
    if (AudioContext && !state.audioCtx) {
      state.audioCtx = new AudioContext();
      await state.audioCtx.resume();
    }
  } catch(e) {}

  showPhase('chat');
  showLoading(true);

  try {
    const response = await callGroq("Bonjour. Je viens d'arriver. C'est ma première fois ici.");
    showLoading(false);
    displayAI(response);
  } catch(e) {
    showLoading(false);
    showError(e.message);
  }
}

async function handleSubmit() {
  const input = document.getElementById('user-input');
  const answer = input.value.trim();
  if (!answer) return;

  input.value = '';
  document.getElementById('input-wrapper').classList.remove('visible');
  document.getElementById('btn-ready').classList.remove('visible');
  stopAudio();
  showLoading(true);

  try {
    const response = await callGroq(answer);
    showLoading(false);
    displayAI(response);
  } catch(e) {
    showLoading(false);
    showError(e.message);
    document.getElementById('input-wrapper').classList.add('visible');
  }
}

async function handleReady() {
  document.getElementById('input-wrapper').classList.remove('visible');
  document.getElementById('btn-ready').classList.remove('visible');
  stopAudio();
  showLoading(true);

  try {
    const response = await callGroq("Je suis prêt·e à passer à autre chose.");
    showLoading(false);
    displayAI(response);
  } catch(e) {
    showLoading(false);
    showError(e.message);
    document.getElementById('input-wrapper').classList.add('visible');
  }
}

function handleRestart() {
  state.history = [];
  state.exchangeCount = 0;
  state.orbColor = '#7b4fd4';
  state.intensity = 0.3;
  state.speaking = false;
  stopAudio();
  document.getElementById('btn-ready').classList.remove('visible');
  document.getElementById('input-wrapper').classList.remove('visible');
  document.getElementById('ai-text').innerHTML = '';
  document.getElementById('emotion-label').textContent = 'présence';
  document.getElementById('session-info').textContent = 'moment 1';
  showPhase('intro');
}

function showLoading(visible) {
  document.getElementById('loading').classList.toggle('visible', visible);
  document.getElementById('ai-text').style.opacity = visible ? '0' : '1';
}

function showError(msg) {
  const el = document.getElementById('ai-text');
  el.style.opacity = '1';
  el.innerHTML = `<span style="color:#ff8888;font-family:Outfit,sans-serif;font-size:0.85rem;font-style:normal">Erreur : ${msg}</span>`;
}

// ── Keyboard ───────────────────────────────────────────
document.addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey) {
    const phase = document.getElementById('phase-chat');
    if (phase.classList.contains('active') && document.getElementById('input-wrapper').classList.contains('visible')) {
      e.preventDefault();
      handleSubmit();
    }
  }
});

// ── Init ───────────────────────────────────────────────
setupOrbs();
</script>
