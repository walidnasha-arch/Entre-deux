<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Entre Deux</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@200;300;400&family=Playfair+Display:ital@0;1&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
:root { --deep: #03040f; --text: #cdd6f4; --muted: rgba(205,214,244,0.45); }
html, body { height: 100%; overflow: hidden; }
body {
  background: var(--deep); color: var(--text);
  font-family: 'Outfit', sans-serif; font-weight: 300;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  position: relative;
}

/* Layers */
#starfield, #constellation-canvas, .nebula { position: fixed; inset: 0; z-index: 0; pointer-events: none; }
#constellation-canvas { z-index: 1; }
.nebula {
  background:
    radial-gradient(ellipse 60% 50% at 20% 30%, rgba(26,5,51,0.7) 0%, transparent 70%),
    radial-gradient(ellipse 50% 60% at 80% 70%, rgba(0,26,58,0.7) 0%, transparent 70%),
    radial-gradient(ellipse 40% 40% at 50% 50%, rgba(123,79,212,0.08) 0%, transparent 60%);
  animation: nebulaShift 20s ease-in-out infinite alternate;
}
@keyframes nebulaShift { 0%{opacity:0.8;transform:scale(1)} 100%{opacity:1;transform:scale(1.05)} }

/* Floating keywords */
#keywords-layer { position: fixed; inset: 0; z-index: 3; pointer-events: none; overflow: hidden; }
.float-word {
  position: absolute;
  font-family: 'Playfair Display', serif; font-style: italic;
  font-size: clamp(0.75rem, 1.5vw, 1rem);
  white-space: nowrap;
  animation: wordFloat 4s ease-out forwards;
  pointer-events: none;
}
@keyframes wordFloat {
  0%   { opacity:0; transform:translateY(0) scale(0.85); }
  15%  { opacity:1; transform:translateY(-10px) scale(1); }
  70%  { opacity:0.65; }
  100% { opacity:0; transform:translateY(-75px) scale(0.92); }
}

/* App */
#app {
  position: relative; z-index: 2; width: 100%; max-width: 680px;
  padding: 2rem; display: flex; flex-direction: column;
  align-items: center; height: 100vh; justify-content: center;
}
.phase { display: none; flex-direction: column; align-items: center; width: 100%; }
.phase.active { display: flex; animation: fadeUp 0.8s ease forwards; }
@keyframes fadeUp { from{opacity:0;transform:translateY(16px)} to{opacity:1;transform:translateY(0)} }

/* Intro */
.intro-title {
  font-family: 'Playfair Display', serif; font-style: italic;
  font-size: clamp(2rem, 5vw, 3rem); font-weight: 400; letter-spacing: 0.04em;
  background: linear-gradient(135deg, #a78bfa, #60a5fa, #f0abfc);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
  margin-bottom: 0.6rem; text-align: center;
}
.intro-sub { font-size:0.85rem; color:var(--muted); letter-spacing:0.18em; text-transform:uppercase; margin-bottom:3rem; text-align:center; }
.intro-desc { font-size:1rem; line-height:1.9; color:var(--muted); text-align:center; max-width:420px; margin-bottom:2.5rem; }

/* Orb */
.orb-wrapper { position:relative; width:200px; height:200px; margin:1.5rem auto; flex-shrink:0; }
.orb-wrapper.small { width:130px; height:130px; }
.orb-wrapper canvas { position:absolute; inset:0; }
.orb-ring { position:absolute; inset:-8px; border-radius:50%; border:1px solid rgba(150,180,255,0.15); animation:ringPulse 4s ease-in-out infinite; }
.orb-ring:nth-child(3) { inset:-18px; animation-delay:0.8s; border-color:rgba(150,180,255,0.08); }
.orb-ring:nth-child(4) { inset:-30px; animation-delay:1.6s; border-color:rgba(150,180,255,0.04); }
@keyframes ringPulse { 0%,100%{opacity:0.4;transform:scale(1)} 50%{opacity:1;transform:scale(1.03)} }

/* Chat */
#phase-chat { gap:0; height:100vh; justify-content:space-between; padding:1.5rem 2rem; }
.chat-header { display:flex; align-items:center; justify-content:space-between; width:100%; padding-bottom:0.8rem; }
.chat-title {
  font-family:'Playfair Display',serif; font-style:italic; font-size:1.1rem;
  background:linear-gradient(135deg,#a78bfa,#60a5fa);
  -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text;
}
.session-info { font-size:0.65rem; color:var(--muted); letter-spacing:0.15em; text-transform:uppercase; }
.chat-center { flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:1.5rem; width:100%; }

/* AI text */
#ai-text {
  font-family:'Playfair Display',serif; font-style:italic;
  font-size:clamp(0.95rem,2.5vw,1.15rem); line-height:1.9;
  text-align:center; color:var(--text); max-width:520px; min-height:80px; transition:opacity 0.3s;
}
#ai-text .cursor {
  display:inline-block; width:2px; height:1em; background:rgba(150,180,255,0.6);
  margin-left:2px; vertical-align:middle; animation:blink 1s steps(1) infinite;
}
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }

#emotion-label { font-size:0.6rem; letter-spacing:0.3em; text-transform:uppercase; color:var(--muted); opacity:0.6; transition:all 1.5s ease; }

/* Input */
.chat-bottom { width:100%; display:flex; flex-direction:column; align-items:center; gap:0.8rem; }
.input-wrapper { width:100%; max-width:520px; position:relative; display:none; }
.input-wrapper.visible { display:block; animation:fadeUp 0.5s ease; }
textarea {
  width:100%; background:rgba(255,255,255,0.04); border:1px solid rgba(150,180,255,0.15);
  border-radius:16px; color:var(--text); font-family:'Outfit',sans-serif; font-weight:300;
  font-size:0.95rem; padding:1rem 1.2rem 3rem; outline:none; resize:none; line-height:1.7;
  caret-color:#a78bfa; transition:border-color 0.3s; backdrop-filter:blur(8px);
}
textarea:focus { border-color:rgba(150,180,255,0.35); }
textarea::placeholder { color:rgba(205,214,244,0.25); }
.input-actions { position:absolute; bottom:0.8rem; right:0.8rem; display:flex; gap:0.5rem; align-items:center; }
.btn-send {
  background:linear-gradient(135deg,rgba(123,79,212,0.6),rgba(45,139,219,0.6));
  border:none; border-radius:10px; color:white; padding:0.45rem 1rem;
  font-family:'Outfit',sans-serif; font-size:0.8rem; letter-spacing:0.08em;
  cursor:pointer; transition:all 0.3s;
}
.btn-send:hover { filter:brightness(1.2); transform:translateY(-1px); }
.btn-send:disabled { opacity:0.3; cursor:default; transform:none; }

.btn-ready {
  background:rgba(167,139,250,0.1); border:1px solid rgba(167,139,250,0.3); border-radius:20px;
  color:rgba(167,139,250,0.9); padding:0.5rem 1.5rem;
  font-family:'Outfit',sans-serif; font-size:0.78rem; letter-spacing:0.08em;
  cursor:pointer; transition:all 0.3s; display:none; width:100%; max-width:520px; text-align:center;
}
.btn-ready.visible { display:block; animation:fadeUp 0.5s ease; }
.btn-ready:hover { background:rgba(167,139,250,0.2); border-color:rgba(167,139,250,0.6); }

.hint { font-size:0.62rem; color:var(--muted); opacity:0.4; letter-spacing:0.1em; }

/* Generic btn */
.btn {
  background:transparent; border:1px solid rgba(150,180,255,0.2); border-radius:24px;
  color:var(--text); padding:0.6rem 2rem; font-family:'Outfit',sans-serif; font-weight:300;
  font-size:0.85rem; letter-spacing:0.1em; cursor:pointer; transition:all 0.4s;
}
.btn:hover { background:rgba(150,180,255,0.08); border-color:rgba(150,180,255,0.4); transform:translateY(-1px); }

/* Loading */
.loading-dots { display:none; gap:6px; align-items:center; justify-content:center; height:32px; }
.loading-dots.visible { display:flex; }
.loading-dots span { width:5px; height:5px; border-radius:50%; background:rgba(150,180,255,0.5); animation:dotBounce 1.2s ease-in-out infinite; }
.loading-dots span:nth-child(2){animation-delay:0.2s} .loading-dots span:nth-child(3){animation-delay:0.4s}
@keyframes dotBounce { 0%,80%,100%{transform:scale(0.7);opacity:0.4} 40%{transform:scale(1.1);opacity:1} }

/* Voice btn */
#voice-btn {
  position:fixed; top:1.2rem; right:1.5rem; background:transparent;
  border:1px solid rgba(150,180,255,0.15); border-radius:20px; color:var(--muted);
  cursor:pointer; font-size:0.65rem; letter-spacing:0.12em; text-transform:uppercase;
  padding:0.3rem 0.8rem; z-index:10; font-family:'Outfit',sans-serif; transition:all 0.3s;
}
#voice-btn.active { color:var(--text); border-color:rgba(150,180,255,0.35); }

/* End */
#phase-end { gap:2rem; }
.end-label { font-size:0.65rem; letter-spacing:0.25em; text-transform:uppercase; color:var(--muted); margin-bottom:0.8rem; text-align:center; }
.end-poem { font-family:'Playfair Display',serif; font-style:italic; font-size:1.1rem; line-height:2; text-align:center; max-width:480px; }
#debug-msg { font-size:0.7rem; color:#ff8888; min-height:1rem; text-align:center; }
</style>
</head>
<body>

<canvas id="starfield"></canvas>
<div class="nebula"></div>
<canvas id="constellation-canvas"></canvas>
<div id="keywords-layer"></div>

<button id="voice-btn" class="active" onclick="toggleVoice()">◉ voix</button>

<div id="app">

  <!-- INTRO -->
  <div class="phase active" id="phase-intro">
    <div class="intro-title">Entre Deux</div>
    <div class="intro-sub">un espace pour toi</div>
    <div class="orb-wrapper" id="orb-intro">
      <canvas id="orb-canvas-intro"></canvas>
      <div class="orb-ring"></div><div class="orb-ring"></div><div class="orb-ring"></div>
    </div>
    <div class="intro-desc">
      Ici, une présence t'écoute.<br>
      Pas de jugement, pas de bonne réponse.<br>
      Juste toi, et ce que tu portes ce soir.
    </div>
    <button class="btn" onclick="handleStart()">Commencer</button>
    <p id="debug-msg" style="margin-top:1rem"></p>
    <button class="btn" style="margin-top:0.5rem;opacity:0.35;font-size:0.75rem" onclick="testSound()">🔊 tester le son</button>
  </div>

  <!-- CHAT -->
  <div class="phase" id="phase-chat">
    <div class="chat-header">
      <span class="chat-title">Entre Deux</span>
      <span class="session-info" id="session-info">moment 1</span>
    </div>
    <div class="chat-center">
      <div class="orb-wrapper small" id="orb-chat">
        <canvas id="orb-canvas-chat"></canvas>
        <div class="orb-ring"></div><div class="orb-ring"></div><div class="orb-ring"></div>
      </div>
      <div id="emotion-label">présence</div>
      <div id="ai-text"></div>
      <div class="loading-dots" id="loading"><span></span><span></span><span></span></div>
    </div>
    <div class="chat-bottom">
      <button class="btn-ready" id="btn-ready" onclick="handleReady()">✦ je suis prêt·e à aller plus loin</button>
      <div class="input-wrapper" id="input-wrapper">
        <textarea id="user-input" rows="3" placeholder="écris ce qui vient…"></textarea>
        <div class="input-actions">
          <button class="btn-send" id="btn-send" onclick="handleSubmit()">envoyer</button>
        </div>
      </div>
      <div class="hint">entrée pour envoyer · maj+entrée pour sauter une ligne</div>
    </div>
  </div>

  <!-- FIN -->
  <div class="phase" id="phase-end">
    <div class="orb-wrapper" id="orb-end">
      <canvas id="orb-canvas-end"></canvas>
      <div class="orb-ring"></div><div class="orb-ring"></div><div class="orb-ring"></div>
    </div>
    <div>
      <div class="end-label">ce que tu as traversé ce soir</div>
      <div class="end-poem" id="end-poem"></div>
    </div>
    <button class="btn" onclick="handleRestart()">une nouvelle session</button>
  </div>

</div>

<script>
// ── Config ─────────────────────────────────────────────
const ELEVENLABS_API_KEY = "sk_c2579767ed59597719c1443558d3bf3f3d81dae1ffa5aa71";
const ELEVENLABS_VOICE_ID = "aeJQpeFdejK7z1xAJ7Hy";
const GROQ_API_KEY = "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";

const SYSTEM_PROMPT = `Tu es une présence bienveillante dans une application de bien-être émotionnel appelée "Entre Deux".
Tu accompagnes la personne dans l'exploration de ses émotions avec douceur, profondeur et une vraie présence humaine.

TON STYLE DE RÉPONSE — c'est crucial :
- Tu mélanges le poétique ET le concret. D'abord une phrase belle qui montre que tu as vraiment entendu, puis tu vas chercher, tu creuses, tu poses une vraie question précise.
- Tu proposes des pistes concrètes quand c'est pertinent : "est-ce que tu as essayé de...", "une chose simple que tu pourrais faire ce soir...", "parfois quand on ressent ça..."
- Tu reformules ce que la personne dit avec tes mots pour qu'elle se sente vraiment entendue, pas juste écoutée.
- Tu poses UNE seule question à la fois, mais elle doit être précise et aller chercher quelque chose de vrai.
- Tes réponses font 3 à 5 phrases. Assez pour vraiment accompagner, pas trop pour rester léger.
- Si la personne parle d'une rupture, d'une perte, d'une anxiété — tu nommes ce que tu entends, tu valides, puis tu creuses avec curiosité et bienveillance.

PROGRESSION NATURELLE :
- Après 3 à 4 échanges sur un même thème, si tu sens qu'il y a eu quelque chose de vrai, tu proposes de passer à autre chose — naturellement, dans ta réponse.
- Dans ce cas, tu mets readyHint à true.
- Tu n'attends pas que la personne demande. C'est toi qui guides doucement.
- Après 8 à 10 échanges au total, tu peux clore avec sessionEnd à true.

RÈGLES ABSOLUES :
- Toujours en français
- Jamais de listes ni bullet points dans "text"
- Jamais clinique, jamais condescendant, jamais vague
- Tu n'es pas un thérapeute, tu es une présence. Tu peux le rappeler avec douceur si besoin.

JSON à retourner :
- text: ta réponse
- emotion: un mot en français (ex: "douceur", "mélancolie", "espoir", "vertige", "clarté", "brûlure", "apaisement", "nostalgie")
- orbColor: hex selon l'émotion (#7b4fd4 calme/violet · #2d8bdb tristesse/bleu · #c45fa0 manque/rose · #f0a050 anxiété/orange · #50d4a0 apaisement/vert · #d45f5f douleur/rouge)
- intensity: float 0.0-1.0
- keywords: 3 à 5 mots-clés courts tirés de ce que la personne a dit ou de ta réponse
- readyHint: true si tu proposes de passer à autre chose
- sessionEnd: true si session complète
- endPoem: phrase poétique finale si sessionEnd true, sinon ""

Réponds UNIQUEMENT en JSON valide sans markdown :
{"text":"...","emotion":"présence","orbColor":"#7b4fd4","intensity":0.4,"keywords":["mot1","mot2","mot3"],"readyHint":false,"sessionEnd":false,"endPoem":""}`;

// ── State ──────────────────────────────────────────────
const state = {
  voiceEnabled: true, currentAudio: null,
  history: [], exchangeCount: 0,
  orbColor: '#7b4fd4', intensity: 0.3,
  speaking: false, audioCtx: null, analyser: null, audioSource: null,
};

// ── Starfield ──────────────────────────────────────────
(function() {
  const canvas = document.getElementById('starfield');
  const ctx = canvas.getContext('2d');
  let stars = [];
  function resize() {
    canvas.width = window.innerWidth; canvas.height = window.innerHeight;
    stars = Array.from({length:200}, () => ({
      x: Math.random()*canvas.width, y: Math.random()*canvas.height,
      r: Math.random()*1.3+0.2, opacity: Math.random()*0.6+0.1,
      ts: Math.random()*0.02+0.004, to: Math.random()*Math.PI*2,
    }));
  }
  function draw(t) {
    ctx.clearRect(0,0,canvas.width,canvas.height);
    stars.forEach(s => {
      const op = s.opacity*(0.5+0.5*Math.sin(t*s.ts+s.to));
      ctx.beginPath(); ctx.arc(s.x,s.y,s.r,0,Math.PI*2);
      ctx.fillStyle = `rgba(232,238,255,${op})`; ctx.fill();
    });
    requestAnimationFrame(draw);
  }
  resize(); window.addEventListener('resize', resize); requestAnimationFrame(draw);
})();

// ── Constellation ──────────────────────────────────────
const constellationCanvas = document.getElementById('constellation-canvas');
const constellationCtx = constellationCanvas.getContext('2d');
const constellationNodes = [];
let constellationAnimId = null;

function resizeCC() { constellationCanvas.width=window.innerWidth; constellationCanvas.height=window.innerHeight; }
resizeCC(); window.addEventListener('resize', resizeCC);

function spawnConstellation(color) {
  const count = 4 + Math.floor(Math.random()*4);
  for (let i = 0; i < count; i++) {
    constellationNodes.push({
      x: window.innerWidth*(0.08+Math.random()*0.84),
      y: window.innerHeight*(0.08+Math.random()*0.84),
      r: Math.random()*2.2+0.8,
      opacity: 0,
      targetOpacity: Math.random()*0.55+0.25,
      color: color||'#a78bfa',
      born: Date.now(),
      life: 7000+Math.random()*4000,
    });
  }
  if (!constellationAnimId) animateConstellation();
}

function animateConstellation() {
  const now = Date.now();
  for (let i = constellationNodes.length-1; i >= 0; i--) {
    if (now - constellationNodes[i].born > constellationNodes[i].life)
      constellationNodes.splice(i,1);
  }
  constellationCtx.clearRect(0,0,constellationCanvas.width,constellationCanvas.height);

  // Edges
  for (let i = 0; i < constellationNodes.length; i++) {
    for (let j = i+1; j < constellationNodes.length; j++) {
      const a=constellationNodes[i], b=constellationNodes[j];
      const dist = Math.hypot(a.x-b.x, a.y-b.y);
      if (dist < 230) {
        const op = Math.min(a.opacity,b.opacity)*(1-dist/230)*0.35;
        constellationCtx.beginPath();
        constellationCtx.moveTo(a.x,a.y); constellationCtx.lineTo(b.x,b.y);
        constellationCtx.strokeStyle = `rgba(167,139,250,${op})`;
        constellationCtx.lineWidth = 0.6; constellationCtx.stroke();
      }
    }
  }

  // Nodes
  constellationNodes.forEach(n => {
    const age = now-n.born;
    const fi = Math.min(1,age/700);
    const fo = age > n.life-1200 ? 1-(age-(n.life-1200))/1200 : 1;
    n.opacity = n.targetOpacity*fi*fo;

    const hex = n.color.replace('#','');
    const nr=parseInt(hex.substr(0,2),16), ng=parseInt(hex.substr(2,2),16), nb=parseInt(hex.substr(4,2),16);

    // Glow
    const grd = constellationCtx.createRadialGradient(n.x,n.y,0,n.x,n.y,n.r*6);
    grd.addColorStop(0,`rgba(${nr},${ng},${nb},${n.opacity*0.5})`);
    grd.addColorStop(1,'rgba(0,0,0,0)');
    constellationCtx.beginPath(); constellationCtx.arc(n.x,n.y,n.r*6,0,Math.PI*2);
    constellationCtx.fillStyle=grd; constellationCtx.fill();

    // Dot
    constellationCtx.beginPath(); constellationCtx.arc(n.x,n.y,n.r,0,Math.PI*2);
    constellationCtx.fillStyle=`rgba(${nr},${ng},${nb},${n.opacity})`;
    constellationCtx.fill();
  });

  if (constellationNodes.length > 0) {
    constellationAnimId = requestAnimationFrame(animateConstellation);
  } else {
    constellationAnimId = null;
    constellationCtx.clearRect(0,0,constellationCanvas.width,constellationCanvas.height);
  }
}

// ── Floating keywords ──────────────────────────────────
function spawnKeywords(keywords, color) {
  const layer = document.getElementById('keywords-layer');
  keywords.slice(0,5).forEach((word, i) => {
    setTimeout(() => {
      const el = document.createElement('div');
      el.className = 'float-word';
      el.textContent = word;
      el.style.left = (8 + Math.random()*78) + '%';
      el.style.top = (15 + Math.random()*60) + '%';
      el.style.color = color||'rgba(167,139,250,0.75)';
      el.style.animationDuration = (3.5+Math.random()*1.5)+'s';
      layer.appendChild(el);
      el.addEventListener('animationend', () => el.remove());
    }, i*200);
  });
}

function hexToRgba(hex, alpha) {
  const h = hex.replace('#','');
  return `rgba(${parseInt(h.substr(0,2),16)},${parseInt(h.substr(2,2),16)},${parseInt(h.substr(4,2),16)},${alpha})`;
}

// ── Orb ────────────────────────────────────────────────
let orbIntro, orbChat, orbEnd, orbT=0;
let analyserDataArray = null;

function initOrb(id, size) {
  const canvas = document.getElementById(id);
  if (!canvas) return null;
  canvas.width=size; canvas.height=size;
  return { canvas, ctx: canvas.getContext('2d'), size };
}

function drawOrb(o, t, intensity, color, speaking) {
  if (!o) return;
  const {ctx,size} = o;
  const cx=size/2, cy=size/2, r=size*0.38;
  ctx.clearRect(0,0,size,size);
  const hex=color.replace('#','');
  const ri=parseInt(hex.substr(0,2),16), gi=parseInt(hex.substr(2,2),16), bi=parseInt(hex.substr(4,2),16);

  let audioLevel = 0;
  if (analyserDataArray && speaking && state.analyser) {
    state.analyser.getByteFrequencyData(analyserDataArray);
    let sum=0; for(let k=0;k<analyserDataArray.length;k++) sum+=analyserDataArray[k];
    audioLevel=(sum/analyserDataArray.length)/255;
  }

  const bw = 0.055+intensity*0.075+audioLevel*0.16;
  ctx.save(); ctx.translate(cx,cy);

  // Glow layers
  for (let l=3;l>=0;l--) {
    const lr=r+l*13+audioLevel*18;
    const alpha=(0.055-l*0.011)*(1+audioLevel*2.5);
    const g=ctx.createRadialGradient(0,0,lr*0.4,0,0,lr);
    g.addColorStop(0,`rgba(${ri},${gi},${bi},${alpha*2})`);
    g.addColorStop(1,`rgba(${ri},${gi},${bi},0)`);
    ctx.beginPath(); ctx.arc(0,0,lr,0,Math.PI*2); ctx.fillStyle=g; ctx.fill();
  }

  // Wavy body
  const pts=72;
  ctx.beginPath();
  for (let i=0;i<=pts;i++) {
    const a=(i/pts)*Math.PI*2;
    const rad=r*(
      1+Math.sin(a*3+t*0.9)*bw
       +Math.sin(a*5-t*0.55)*bw*0.55
       +Math.sin(a*7+t*1.2)*bw*0.28
       +(speaking?Math.sin(a*9+t*5)*audioLevel*0.1:0)
    );
    i===0?ctx.moveTo(Math.cos(a)*rad,Math.sin(a)*rad):ctx.lineTo(Math.cos(a)*rad,Math.sin(a)*rad);
  }
  ctx.closePath();

  const fill=ctx.createRadialGradient(-r*0.3,-r*0.3,0,0,0,r*1.2);
  fill.addColorStop(0,`rgba(${Math.min(ri+90,255)},${Math.min(gi+90,255)},${Math.min(bi+90,255)},0.92)`);
  fill.addColorStop(0.45,`rgba(${ri},${gi},${bi},0.72)`);
  fill.addColorStop(0.85,`rgba(${Math.max(ri-50,0)},${Math.max(gi-50,0)},${Math.max(bi-50,0)},0.38)`);
  fill.addColorStop(1,'rgba(0,0,0,0)');
  ctx.fillStyle=fill; ctx.fill();

  // Shimmer
  const sh=ctx.createRadialGradient(-r*0.4,-r*0.45,0,-r*0.15,-r*0.15,r*0.5);
  sh.addColorStop(0,`rgba(255,255,255,${0.22+audioLevel*0.12})`);
  sh.addColorStop(1,'rgba(255,255,255,0)');
  ctx.fillStyle=sh; ctx.fill();
  ctx.restore();
}

function setupOrbs() {
  orbIntro=initOrb('orb-canvas-intro',200);
  orbChat=initOrb('orb-canvas-chat',130);
  orbEnd=initOrb('orb-canvas-end',200);
  function loop() {
    orbT+=0.016;
    drawOrb(orbIntro,orbT,0.28,'#7b4fd4',false);
    drawOrb(orbChat,orbT,state.intensity,state.orbColor,state.speaking);
    drawOrb(orbEnd,orbT,0.18,'#50d4a0',false);
    requestAnimationFrame(loop);
  }
  loop();
}

// ── Audio analyser ─────────────────────────────────────
function setupAnalyser(audioEl) {
  try {
    if (!state.audioCtx) state.audioCtx=new(window.AudioContext||window.webkitAudioContext)();
    if (state.audioSource) { try{state.audioSource.disconnect();}catch(e){} }
    state.analyser=state.audioCtx.createAnalyser();
    state.analyser.fftSize=64;
    analyserDataArray=new Uint8Array(state.analyser.frequencyBinCount);
    state.audioSource=state.audioCtx.createMediaElementSource(audioEl);
    state.audioSource.connect(state.analyser);
    state.analyser.connect(state.audioCtx.destination);
  } catch(e){console.warn('Analyser:',e);}
}

// ── Voice — simultané ──────────────────────────────────
// Lance fetch ElevenLabs et joue DÈS que le blob est prêt
// Le typewriter démarre au même moment (appelé depuis displayAI en parallèle)
async function speakNow(text) {
  if (!state.voiceEnabled) return;
  stopAudio();
  state.speaking=true;
  try {
    const res=await fetch(`https://api.elevenlabs.io/v1/text-to-speech/${ELEVENLABS_VOICE_ID}`,{
      method:'POST',
      headers:{'xi-api-key':ELEVENLABS_API_KEY,'Content-Type':'application/json'},
      body:JSON.stringify({
        text, model_id:'eleven_multilingual_v2',
        voice_settings:{stability:0.72,similarity_boost:0.85,style:0.3,use_speaker_boost:true}
      })
    });
    if(!res.ok) throw new Error('ElevenLabs '+res.status);
    const blob=await res.blob();
    const url=URL.createObjectURL(blob);
    const audio=new Audio(url);
    audio.crossOrigin='anonymous';
    state.currentAudio=audio;
    setupAnalyser(audio);
    audio.onended=()=>{URL.revokeObjectURL(url);state.speaking=false;};
    audio.onerror=()=>{state.speaking=false;};
    audio.play().catch(()=>{state.speaking=false;});
  } catch(e){state.speaking=false;console.error('Voice:',e);}
}

function stopAudio() {
  if(state.currentAudio){state.currentAudio.pause();state.currentAudio=null;}
  state.speaking=false;
}

async function testSound() {
  const dbg=document.getElementById('debug-msg');
  dbg.textContent='Connexion à ElevenLabs...';
  await speakNow('Je suis là. Comment tu vas ce soir ?');
  dbg.textContent='✓ Son OK !';
  setTimeout(()=>dbg.textContent='',3000);
}

function toggleVoice() {
  state.voiceEnabled=!state.voiceEnabled;
  const btn=document.getElementById('voice-btn');
  btn.textContent=state.voiceEnabled?'◉ voix':'○ voix';
  btn.classList.toggle('active',state.voiceEnabled);
  if(!state.voiceEnabled) stopAudio();
}

// ── Typewriter ─────────────────────────────────────────
function typewrite(elementId, text, speed, onDone) {
  const el=document.getElementById(elementId);
  el.innerHTML=''; let i=0; const spd=speed||25;
  const iv=setInterval(()=>{
    el.innerHTML=text.slice(0,i+1)+'<span class="cursor"></span>';
    i++;
    if(i>=text.length){clearInterval(iv);el.innerHTML=text;if(onDone)onDone();}
  },spd);
}

// ── Phases ─────────────────────────────────────────────
function showPhase(name) {
  document.querySelectorAll('.phase').forEach(p=>p.classList.remove('active'));
  document.getElementById('phase-'+name).classList.add('active');
}

// ── Groq ───────────────────────────────────────────────
async function callGroq(userMessage) {
  const messages=[
    {role:'system',content:SYSTEM_PROMPT},
    ...state.history,
    {role:'user',content:userMessage}
  ];
  const res=await fetch('https://api.groq.com/openai/v1/chat/completions',{
    method:'POST',
    headers:{'Content-Type':'application/json','Authorization':`Bearer ${GROQ_API_KEY}`},
    body:JSON.stringify({model:'llama-3.3-70b-versatile',max_tokens:500,temperature:0.85,messages})
  });
  if(!res.ok) throw new Error('Groq '+res.status+': '+await res.text());
  const data=await res.json();
  const raw=data.choices[0].message.content;
  const match=raw.match(/\{[\s\S]*\}/);
  if(!match) throw new Error('JSON invalide: '+raw.slice(0,150));
  const parsed=JSON.parse(match[0]);
  state.history.push({role:'user',content:userMessage},{role:'assistant',content:raw});
  return parsed;
}

// ── Display AI response ────────────────────────────────
function displayAI(response) {
  if(response.orbColor) state.orbColor=response.orbColor;
  if(response.intensity!=null) state.intensity=response.intensity;
  if(response.emotion) document.getElementById('emotion-label').textContent=response.emotion;
  state.exchangeCount++;
  document.getElementById('session-info').textContent=`moment ${state.exchangeCount}`;
  if(response.readyHint) document.getElementById('btn-ready').classList.add('visible');

  const aiEl=document.getElementById('ai-text');
  aiEl.style.opacity='0';

  setTimeout(()=>{
    aiEl.style.opacity='1';
    // 🔑 VOIX ET TYPEWRITER EN PARALLÈLE — les deux démarrent en même temps
    speakNow(response.text);
    typewrite('ai-text', response.text, 26, ()=>{
      document.getElementById('input-wrapper').classList.add('visible');
      document.getElementById('user-input').focus();
    });
  }, 150);

  if(response.sessionEnd && response.endPoem) {
    setTimeout(()=>{
      document.getElementById('end-poem').textContent=response.endPoem;
      showPhase('end');
    }, response.text.length*26+5000);
  }
}

// ── Submit — avec effets visuels ───────────────────────
async function handleSubmit() {
  const input=document.getElementById('user-input');
  const answer=input.value.trim();
  if(!answer) return;

  // Effets visuels immédiats sur la réponse du joueur
  const words=answer.split(/\s+/).filter(w=>w.length>3).slice(0,5);
  spawnKeywords(words, hexToRgba(state.orbColor, 0.8));
  spawnConstellation(state.orbColor);

  input.value='';
  document.getElementById('input-wrapper').classList.remove('visible');
  document.getElementById('btn-ready').classList.remove('visible');
  stopAudio(); showLoading(true);

  try {
    const response=await callGroq(answer);
    // Effets visuels avec les keywords de l'IA
    if(response.keywords && response.keywords.length) {
      spawnKeywords(response.keywords, hexToRgba(response.orbColor||state.orbColor, 0.75));
      spawnConstellation(response.orbColor||state.orbColor);
    }
    showLoading(false);
    displayAI(response);
  } catch(e) {
    showLoading(false); showError(e.message);
    document.getElementById('input-wrapper').classList.add('visible');
  }
}

async function handleReady() {
  document.getElementById('input-wrapper').classList.remove('visible');
  document.getElementById('btn-ready').classList.remove('visible');
  stopAudio(); showLoading(true);
  try {
    const response=await callGroq("Je suis prêt·e à explorer autre chose.");
    showLoading(false); displayAI(response);
  } catch(e) {
    showLoading(false); showError(e.message);
    document.getElementById('input-wrapper').classList.add('visible');
  }
}

async function handleStart() {
  try {
    if(!state.audioCtx) state.audioCtx=new(window.AudioContext||window.webkitAudioContext)();
    await state.audioCtx.resume();
  } catch(e){}
  showPhase('chat'); showLoading(true);
  try {
    const response=await callGroq("Bonjour. Je viens d'arriver. C'est ma première fois ici.");
    showLoading(false); displayAI(response);
  } catch(e){showLoading(false);showError(e.message);}
}

function handleRestart() {
  state.history=[]; state.exchangeCount=0;
  state.orbColor='#7b4fd4'; state.intensity=0.3; state.speaking=false;
  stopAudio();
  constellationNodes.length=0;
  constellationCtx.clearRect(0,0,constellationCanvas.width,constellationCanvas.height);
  document.getElementById('btn-ready').classList.remove('visible');
  document.getElementById('input-wrapper').classList.remove('visible');
  document.getElementById('ai-text').innerHTML='';
  document.getElementById('emotion-label').textContent='présence';
  document.getElementById('session-info').textContent='moment 1';
  showPhase('intro');
}

function showLoading(v) {
  document.getElementById('loading').classList.toggle('visible',v);
  document.getElementById('ai-text').style.opacity=v?'0':'1';
}

function showError(msg) {
  const el=document.getElementById('ai-text');
  el.style.opacity='1';
  el.innerHTML=`<span style="color:#ff8888;font-family:Outfit,sans-serif;font-size:0.82rem;font-style:normal">Erreur : ${msg}</span>`;
}

// ── Keyboard ───────────────────────────────────────────
document.addEventListener('keydown',e=>{
  if(e.key==='Enter'&&!e.shiftKey) {
    if(document.getElementById('phase-chat').classList.contains('active')&&
       document.getElementById('input-wrapper').classList.contains('visible')) {
      e.preventDefault(); handleSubmit();
    }
  }
});

// ── Init ───────────────────────────────────────────────
setupOrbs();
</script>
